<!DOCTYPE html>
<>
<head>
  <title>Marketplace - Iphe's World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: #070b14; color: #ffffff; position: relative; overflow-x: hidden; padding-bottom: 40px; }
    
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background: radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 85% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
      z-index: 0; pointer-events: none; animation: backgroundShift 15s ease-in-out infinite alternate;
    }
    @keyframes backgroundShift { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

    .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; padding: 0 15px; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px; margin: 0 -15px 25px -15px; position: sticky; top: 0; z-index: 90; background: rgba(7, 11, 20, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #38bdf8, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% 200%; animation: gradientFlow 5s ease infinite; }
    @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .nav-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 12px; color: #cbd5e1; text-decoration: none; font-weight: 600; font-size: 13px; transition: 0.3s; }
    .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .identity-bar { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 16px; padding: 15px 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .identity-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; }
    .identity-badge-active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 6px 12px; border-radius: 8px; font-weight: 700; border: 1px solid rgba(56, 189, 248, 0.2); }
    .identity-auth-inputs { display: flex; gap: 8px; align-items: center; }
    .identity-input { padding: 10px 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 13px; outline: none; width: 180px; transition: 0.3s; }
    .identity-input:focus { border-color: #a855f7; box-shadow: 0 0 15px rgba(168,85,247,0.2); }
    .identity-btn { padding: 10px 18px; background: linear-gradient(135deg, #38bdf8, #a855f7); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .identity-btn:active { transform: scale(0.95); }
    .identity-logout { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 10px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }

    .form-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; margin-bottom: 35px; position: relative; }
    .form-card h3 { font-size: 18px; margin-bottom: 20px; color: #fff; font-weight: 700; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
    .form-card div.form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
    .form-group label { font-size: 12px; color: #94a3b8; font-weight: 500; padding-left: 4px; }
    .form-group input, .form-group textarea, .form-group select { padding: 14px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; color: #ffffff; font-size: 14px; outline: none; transition: 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #38bdf8; background: rgba(0, 0, 0, 0.5); }
    .full-width { grid-column: 1 / -1; }
    .form-group select option { background: #0f172a; color: #fff; }
    
    .dictate-btn { position: absolute; right: 10px; bottom: 10px; background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; z-index: 5; font-size: 16px; }
    .dictate-btn.recording { background: rgba(239, 68, 68, 0.3); border-color: #ef4444; animation: pulseGlow 1.5s infinite; }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

    .flash-toggle-wrapper { display: flex; align-items: center; gap: 10px; background: rgba(245, 158, 11, 0.05); border: 1px solid rgba(245, 158, 11, 0.2); padding: 12px 15px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    .flash-toggle-wrapper input { cursor: pointer; accent-color: #fbbf24; width: 16px; height: 16px; }
    .flash-toggle-wrapper span { font-size: 13px; color: #fcd34d; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .post-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #38bdf8, #a855f7); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 15px; transition: 0.2s; position: relative; overflow: hidden; }
    .post-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); transition: 0.5s; }
    .post-btn:hover::after { left: 150%; }

    .search-filter-row { display: flex; gap: 12px; margin-bottom: 15px; }
    .search-input { flex: 1; padding: 14px 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px; color: #ffffff; font-size: 15px; outline: none; transition: 0.3s; }
    .search-input:focus { border-color: #a855f7; background: rgba(0, 0, 0, 0.4); }
    .sort-dropdown { padding: 14px 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px; color: #fff; font-size: 14px; cursor: pointer; }
    .sort-dropdown option { background: #0f172a; }

    .category-tabs { display: flex; gap: 12px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-chip { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 10px 20px; border-radius: 20px; color: #cbd5e1; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
    .tab-chip:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateY(-2px); }
    .tab-chip.active { background: rgba(56, 189, 248, 0.15); border-color: #38bdf8; color: #38bdf8; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; perspective: 1000px; }
    
    .product-card { position: relative; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 16px; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.1s ease-out, box-shadow 0.1s ease-out, border-color 0.4s; transform-style: preserve-3d; }
    .product-card:hover { border-color: rgba(168, 85, 247, 0.4); z-index: 10; }
    
    .product-card.flash-active { border-color: #fbbf24; box-shadow: 0 0 25px rgba(245, 158, 11, 0.15); }
    .flash-timer { position: absolute; top: -10px; left: 16px; background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #000; font-weight: 800; font-size: 11px; padding: 4px 10px; border-radius: 8px; z-index: 10; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }

    .product-image { width: 100%; height: 220px; border-radius: 16px; object-fit: cover; margin-bottom: 15px; background: rgba(0,0,0,0.2); transition: 0.3s; transform: translateZ(20px); }
    
    .wishlist-btn { position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; z-index: 5; transform: translateZ(30px); }
    .wishlist-btn:active { transform: translateZ(30px) scale(0.8); }
    .wishlist-btn.favorited { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); }

    .badge-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; transform: translateZ(25px); }
    .category-badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); }
    .condition-badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(168, 85, 247, 0.1); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
    
    .smart-tags-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; transform: translateZ(20px); }
    .smart-tag { background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); color: #e2e8f0; font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; letter-spacing: 0.5px; }

    .rep-badge { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; background: rgba(250, 204, 21, 0.1); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.2); margin-top: 5px; width: fit-content; transform: translateZ(25px); }
    .rep-badge.verified { background: rgba(34, 197, 94, 0.1); color: #4ade80; border-color: rgba(34, 197, 94, 0.2); }

    .product-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #fff; line-height: 1.3; transform: translateZ(30px); }
    .product-price { font-size: 22px; color: #38bdf8; font-weight: 800; margin-bottom: 5px; transform: translateZ(30px); }
    .product-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transform: translateZ(15px); }
    
    .contact-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; transform: translateZ(20px); }
    .contact-btn { padding: 10px 0; border-radius: 10px; font-weight: 700; font-size: 11px; text-align: center; color: #fff; transition: 0.2s; border: none; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .contact-btn:active { transform: scale(0.92); }
    .btn-wa { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; }
    .btn-call { background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.3); color: #38bdf8; }
    .btn-mail { background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.3); color: #c084fc; }
    .btn-chat { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #fbbf24; }

    .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; transform: translateZ(15px); }
    .action-sub-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; color: #cbd5e1; }
    .action-sub-btn.delete { color: #fca5a5; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }
    .action-sub-btn.sold { color: #fcd34d; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }
    .action-sub-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s ease; padding: 15px; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 550px; width: 100%; border-radius: 24px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; max-height: 90vh; overflow-y: auto; text-align: left; }
    .modal-close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; border-radius: 50%; width: 36px; height: 36px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s; }
    .modal-image { width: 100%; height: 280px; border-radius: 16px; object-fit: cover; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); cursor: zoom-in; }

    .qa-board { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-top: 25px; }
    .qa-board h4 { font-size: 14px; color: #a855f7; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .qa-list { display: flex; flex-direction: column; gap: 10px; max-height: 180px; overflow-y: auto; margin-bottom: 12px; padding-right: 5px; }
    .qa-item { background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 12px; font-size: 12px; line-height: 1.4; }
    .qa-author { color: #38bdf8; font-weight: 700; margin-bottom: 4px; display: block; font-size: 11px; }
    .qa-input-wrapper { display: flex; gap: 8px; }
    .qa-input-wrapper input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 12px; outline: none; }
    .qa-input-wrapper button { padding: 0 16px; background: #a855f7; border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 12px; cursor: pointer; }

    .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; cursor: zoom-out; }
    .lightbox-overlay.active { opacity: 1; pointer-events: auto; }
    .lightbox-img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; box-shadow: 0 0 50px rgba(56, 189, 248, 0.2); }

    .chat-box-overlay { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 150; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transform: translateY(40px); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); backdrop-filter: blur(20px); }
    .chat-box-overlay.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .chat-box-header { background: rgba(0,0,0,0.3); padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
    .chat-box-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.4; }
    .msg-bubble.sent { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-bubble.received { background: rgba(255, 255, 255, 0.08); color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-box-input-area { padding: 12px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 8px; }
    .chat-box-input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 13px; outline: none; }
    .chat-box-send { background: #38bdf8; border: none; color: #0f172a; padding: 0 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #38bdf8; color: #0f172a; padding: 14px 28px; border-radius: 30px; font-weight: 700; font-size: 14px; z-index: 300; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }

    @media(max-width: 650px) {
      .search-filter-row { flex-direction: column; gap: 10px; }
      .contact-group { grid-template-columns: repeat(2, 1fr); }
      .chat-box-overlay { width: calc(100% - 30px); right: 15px; left: 15px; }
    }
  </style>
</head>
<body>

  <div class="lightbox-overlay" id="imageLightbox" onclick="closeLightbox()">
      <img id="lightboxImg" class="lightbox-img" src="" alt="Full Screen Zoom">
  </div>
  
  <canvas id="confettiCanvas"></canvas>

  <div class="container">
    <header>
      <div>
        <h1>Marketplace</h1>
        <p style="color: #94a3b8; font-size: 13px; font-weight: 500;">Next-Gen Trading Hub</p>
      </div>
      <a href="dashboard.html" class="nav-btn">Dashboard</a>
    </header>

    <div class="identity-bar">
      <div class="identity-status">
        <span>Identity:</span>
        <span class="identity-badge-active" id="activeIdentityId">@Guest</span>
      </div>
      <div class="identity-auth-inputs" id="identityActionPane">
        <input type="text" class="identity-input" id="authUserIdInput" placeholder="Enter handle...">
        <button class="identity-btn" onclick="executeIdentityLogin()">Link ID</button>
      </div>
    </div>

    <div class="form-card">
      <h3>Post a New Product</h3>
      <form onsubmit="handleProductSubmission(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="prodTitle" required placeholder="e.g. Cyberpunk Jacket">
          </div>
          <div class="form-group">
            <label>Price</label>
            <input type="text" id="prodPrice" required placeholder="e.g. $120.00">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="prodCategory" required>
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Vehicles">Vehicles</option>
              <option value="Home & Living">Home & Living</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Condition</label>
            <select id="prodCondition" required>
              <option value="Brand New">Brand New</option>
              <option value="Like New">Like New</option>
              <option value="Gently Used">Gently Used</option>
              <option value="Fixer Upper">Heavily Used</option>
            </select>
          </div>
          <div class="form-group">
            <label>WhatsApp Number</label>
            <input type="tel" id="prodWA" required placeholder="2348012345678">
          </div>
          <div class="form-group">
            <label>Image Upload</label>
            <input type="file" id="prodImg" accept="image/*">
          </div>
          <div class="form-group full-width">
            <label>Description</label>
            <textarea id="prodDesc" rows="2" required placeholder="Describe the item..."></textarea>
            <button type="button" class="dictate-btn" id="dictateBtn" onclick="toggleDictation()" title="Use Voice to Text">🎙️</button>
          </div>
          
          <div class="form-group full-width">
            <label class="flash-toggle-wrapper">
              <input type="checkbox" id="prodFlashSale">
              <span>⚡ Make this a 24-Hour Flash Sale</span>
            </label>
          </div>
        </div>
        <button type="submit" class="post-btn" id="submitPostBtn">Publish Listing to Matrix</button>
      </form>
    </div>

    <div class="search-filter-row">
      <input type="text" id="searchBar" class="search-input" placeholder="🔍 Search database..." oninput="executeCombinedFilters()">
      <select id="sortSelect" class="sort-dropdown" onchange="executeCombinedFilters()">
        <option value="newest">Latest Drops</option>
        <option value="priceLow">Price: Low to High</option>
        <option value="priceHigh">Price: High to Low</option>
      </select>
    </div>

    <div class="category-tabs">
      <button class="tab-chip active" onclick="filterByChip('All', this)">All Items</button>
      <button class="tab-chip" onclick="filterByChip('Electronics', this)">Electronics</button>
      <button class="tab-chip" onclick="filterByChip('Fashion', this)">Fashion</button>
      <button class="tab-chip" onclick="filterByChip('Vehicles', this)">Vehicles</button>
      <button class="tab-chip" onclick="filterByChip('Watchlist', this)">❤️ Saved</button>
      <button class="tab-chip" onclick="filterByChip('InboxChats', this)" style="border-color: #a855f7; color: #c084fc;">💬 My Chats</button>
    </div>

    <div class="product-grid" id="marketGrid"></div>
  </div>

  <div class="modal-overlay" id="productModal" onclick="closeModalWindow(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close-btn" onclick="closeModalWindow(null)">✕</button>
      
      <img id="modalImg" src="" class="modal-image" alt="Product View" onclick="openLightbox(this.src)">
      
      <div class="badge-container" style="margin-bottom: 8px;">
        <span id="modalCategory" class="category-badge"></span>
        <span id="modalCondition" class="condition-badge"></span>
      </div>
      
      <div id="modalSmartTags" class="smart-tags-container"></div>

    function generateSellerReputation(ownerId) {
      if(ownerId.startsWith('Guest_')) return { score: 3.5, reviews: 2, verified: false, label: "New User" };
      let hash = 0;
      for (let i = 0; i < ownerId.length; i++) hash += ownerId.charCodeAt(i);
      const score = (4.0 + (hash % 10) / 10).toFixed(1); 
      const reviews = (hash % 150) + 12;
      const verified = hash % 2 !== 0; 
      return { score, reviews, verified, label: verified ? "Trusted Seller" : "Active Member" };
    }

    // AI Voice Dictation Logic
    let recognition;
    let isDictating = false;
    window.toggleDictation = function() {
      const btn = document.getElementById('dictateBtn');
      const descBox = document.getElementById('prodDesc');
      
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        return alert("Voice dictation is not supported by your browser yet!");
      }

      if (isDictating) {
        recognition.stop();
        return;
      }

      const SpeechAlgo = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechAlgo();
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onstart = () => {
        isDictating = true;
        btn.classList.add('recording');
        triggerCustomNotificationToast("Listening... Speak now 🎙️");
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
          else interimTranscript += event.results[i][0].transcript;
        }
        descBox.value = descBox.value + finalTranscript;
      };

      recognition.onend = () => {
        isDictating = false;
        btn.classList.remove('recording');
      };

      recognition.start();
    }

    function extractSmartTags(title, desc) {
      const stops = ["this", "that", "with", "from", "your", "have", "very", "like", "just"];
      const words = (title + " " + desc).toLowerCase().replace(/[^a-z0-9 ]/g, "").split(" ");
      let validWords = words.filter(w => w.length >= 4 && !stops.includes(w));
      let uniqueSet = [...new Set(validWords)].slice(0, 3);
      return uniqueSet.map(word => `#${word.charAt(0).toUpperCase() + word.slice(1)}`);
    }

          el.innerHTML = "⚡ FLASH ENDED";
          el.style.background = "#475569";
        } else {
          let h = Math.floor((diff % 86400000) / 3600000);
          let m = Math.floor((diff % 3600000) / 60000);
          let s = Math.floor((diff % 60000) / 1000);
          el.innerHTML = `⚡ ${h}h ${m}m ${s}s`;
        }
      });
    }

    window.executeCombinedFilters = function() {
      const grid = document.getElementById('marketGrid');
      if(!grid) return;

      const searchInput = document.getElementById('searchBar');
      const searchQuery = searchInput ? searchInput.value.toLowerCase() : "";
      
      const sortSelect = document.getElementById('sortSelect');
      const sortValue = sortSelect ? sortSelect.value : "newest";
      
      grid.innerHTML = "";

      let dynamicMatches = productCatalog.filter(item => {
        // BUG FIX 1: Handle 'InboxChats' category to filter items containing user's active dialog threads
        let matchesCategory = false;
        if (selectedCategoryFilter === "All") {
          matchesCategory = true;
        } else if (selectedCategoryFilter === "Watchlist") {
          matchesCategory = wishlistCatalog.includes(item.id);
        } else if (selectedCategoryFilter === "InboxChats") {
          matchesCategory = messageDatabase.some(m => m.productId === item.id && (m.sender === currentLoggedUser || m.receiver === currentLoggedUser));
        } else {
          matchesCategory = (item.category === selectedCategoryFilter);
        }

        const matchesText = item.title.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery);
        return matchesCategory && matchesText;
      });

      dynamicMatches.sort((a, b) => {
        if (sortValue === "newest") return b.timestamp ? b.timestamp - a.timestamp : 0;
        const pA = parseFloat(a.price.replace(/[^0-9.]/g, '')) || 0;
        const pB = parseFloat(b.price.replace(/[^0-9.]/g, '')) || 0;
        if (sortValue === "priceLow") return pA - pB;
        if (sortValue === "priceHigh") return pB - pA;
      });

      if(dynamicMatches.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">No matching products found in the cloud.</p>`;

      dynamicMatches.forEach(product => {
        const isFavorited = wishlistCatalog.includes(product.id);
        const favoriteClass = isFavorited ? "wishlist-btn favorited" : "wishlist-btn";
        const isSold = product.isSold;

        const rep = generateSellerReputation(product.ownerId);
        const repBadgeHTML = `<div class="rep-badge ${rep.verified ? 'verified' : ''}">⭐ ${rep.score} | ${rep.verified ? '🛡️ Verified' : '👤 ' + rep.label}</div>`;

        const isFlashSale = product.flashExp > Date.now();
        const flashHTML = isFlashSale ? `<div class="flash-timer" data-exp="${product.flashExp}"></div>` : '';
        const flashClass = isFlashSale ? "flash-active" : "";

        const tagsHtml = (product.smartTags || []).map(t => `<span class="smart-tag">${t}</span>`).join('');

        const cardHTML = `
          <div class="product-card ${flashClass}" onclick="openProductDetailModal('${product.id}')">

            <button class="${favoriteClass}" onclick="toggleWishlist('${product.id}', this, event)">${isFavorited ? '❤️' : '🤍'}</button>
            <div>
              <img src="${product.image}" class="product-image" style="${imageFilter}">
              <div class="badge-container">
                <span class="category-badge">${product.category}</span>
                ${isSold ? `<span style="background:rgba(239,68,68,0.2); color:#fca5a5; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">SOLD OUT</span>` : ''}
              </div>
              <div class="smart-tags-container">${tagsHtml}</div>
              <h2 class="product-title" style="${isSold ? 'text-decoration:line-through; color:#64748b;' : ''}">${product.title}</h2>
              <div style="font-size:12px; color:#a855f7; margin-bottom:4px; transform: translateZ(25px);">By: ${product.ownerId}</div>
              ${repBadgeHTML}
              <div class="product-price" style="margin-top:10px; ${isSold ? 'color:#475569;' : ''}">${product.price}</div>
            </div>
            <div class="card-actions" onclick="event.stopPropagation()">
              <div style="display:flex; gap:8px;">
                <button class="action-sub-btn delete" onclick="deleteProduct('${product.id}')">Del</button>
                <button class="action-sub-btn sold" onclick="toggleMarkAsSold('${product.id}', event)">${isSold ? 'Undo' : 'Sold'}</button>
              </div>
              <button class="action-sub-btn" style="color:#38bdf8;" onclick="initializeDirectChatSession('${product.id}', '${product.ownerId}', '${product.title.replace(/'/g, "\\'")}')">💬 Chat</button>

      });

      apply3DTilt(); 
      updateFlashTimers();

    function apply3DTilt() {
      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('mousemove', e => {
          let rect = card.getBoundingClientRect();
          let x = e.clientX - rect.left;
          let y = e.clientY - rect.top;
          let rotateX = ((y / rect.height) - 0.5) * -12; 
          let rotateY = ((x / rect.width) - 0.5) * 12;
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });
      });
    }

    function triggerConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      let particles = [];
      for(let i = 0; i < 100; i++) {
        particles.push({
          x: canvas.width / 2, y: canvas.height / 2,
          r: Math.random() * 6 + 2,
          dx: Math.random() * 10 - 5, dy: Math.random() * -10 - 5,
          color: ['#38bdf8', '#a855f7', '#fbbf24', '#4ade80', '#ec4899'][Math.floor(Math.random() * 5)]
        });
      }

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, index) => {
          p.x += p.dx; p.y += p.dy; p.dy += 0.3; // gravity
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.fill();
          if(p.y > canvas.height) particles.splice(index, 1);
        });
      }
      animate();
      setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 3000);
    }

    // --- UPLOAD TO CLOUD LOGIC ---
    window.handleProductSubmission = function(event) {
      event.preventDefault();
      const submitBtn = document.getElementById('submitPostBtn');
      submitBtn.textContent = "Uploading to Matrix...";
      submitBtn.disabled = true;

      const file = document.getElementById('prodImg').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) { 
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 400; 
            let scaleSize = img.width <= MAX_WIDTH ? 1 : MAX_WIDTH / img.width;
            canvas.width = img.width * scaleSize;
            canvas.height = img.height * scaleSize;
            
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            executePostCreation(canvas.toDataURL('image/jpeg', 0.4));
          }
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        executePostCreation(defaultPlaceholderImage);
      }
    }

    async function executePostCreation(imgUri) {
      const title = document.getElementById('prodTitle').value;
      const desc = document.getElementById('prodDesc').value;
      const isFlash = document.getElementById('prodFlashSale').checked;

      // PUSH TO FIREBASE CLOUD
      await addDoc(collection(db, "products"), {
        title: title,
        price: document.getElementById('prodPrice').value,
        category: document.getElementById('prodCategory').value,
        condition: document.getElementById('prodCondition').value,
        image: imgUri,
        waNumber: document.getElementById('prodWA').value,
        desc: desc,
        ownerId: currentLoggedUser,
        isSold: false,
        flashExp: isFlash ? Date.now() + 86400000 : 0,
        smartTags: extractSmartTags(title, desc),
        timestamp: Date.now()
      });
      
      document.getElementById('submitPostBtn').form.reset();
      document.getElementById('submitPostBtn').textContent = "Publish Listing to Matrix";
      document.getElementById('submitPostBtn').disabled = false;
      
      triggerConfetti(); 
      triggerCustomNotificationToast("Listing live on the cloud! 🚀");
    }

      const targetItem = productCatalog.find(item => item.id === targetId);
      // BUG FIX 2: Strict check ensuring ONLY the item owner can delete the product listing. Guests cannot wipe others out.
      if (targetItem.ownerId !== currentLoggedUser) {
        return alert("Permission denied! You do not own this listing.");
      }
      
      await deleteDoc(doc(db, "products", targetId));
      triggerCustomNotificationToast("Deleted from Cloud.");
    }

    window.toggleMarkAsSold = async function(targetId, e) {
      e.stopPropagation();
      const targetItem = productCatalog.find(item => item.id === targetId);
      // BUG FIX 2 CONT: Strict check ensuring ONLY the item owner can mark it as sold.
      if (targetItem.ownerId !== currentLoggedUser) {
        return alert("Permission denied! You do not own this listing.");
      }
      
      await updateDoc(doc(db, "products", targetId), { isSold: !targetItem.isSold });
      
      if(!targetItem.isSold) triggerConfetti();

    function triggerCustomNotificationToast(msg) {
      const toast = document.getElementById('shareToast');
      if(!toast) return;
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    window.initializeDirectChatSession = function(pId, targetOwner, title) {
      if(currentLoggedUser === targetOwner) return alert("This is your item!");
      const lex = [currentLoggedUser, targetOwner].sort();
      activeOpenThreadId = `${lex[0]}|||${lex[1]}|||${pId}`; // Upgraded delimiter to ||| to protect usernames containing underscores
      activeOpenProductContextId = pId;
      document.getElementById('chatHeaderTargetUser').textContent = targetOwner;
      document.getElementById('chatHeaderTargetProduct').textContent = title;
      renderFloatingMessagesContainer();
      document.getElementById('p2pChatBoxInstance').classList.add('active');
      closeModalWindow(null);
    }

    window.transmitChatMessage = async function() {
      const field = document.getElementById('chatBoxInputField');
      if(!field.value.trim() || !activeOpenThreadId) return;
      
      const parts = activeOpenThreadId.split('|||');
      let targetReceiver = parts[0] === currentLoggedUser ? parts[1] : parts[0];

      await addDoc(collection(db, "chats"), {
        id: Date.now(), 
        threadId: activeOpenThreadId, 
        productId: activeOpenProductContextId,
        sender: currentLoggedUser, 
        receiver: targetReceiver,
        text: field.value.trim(),
        timestamp: Date.now()
      });
      
      field.value = "";
    }

    function renderFloatingMessagesContainer() {
      const cont = document.getElementById('chatBoxMessageViewport');
      cont.innerHTML = "";
      let rel = messageDatabase.filter(m => m.threadId === activeOpenThreadId);
      rel.forEach(m => {
        const c = m.sender === currentLoggedUser ? "sent" : "received";
        cont.innerHTML += `<div class="msg-bubble ${c}">${m.text}</div>`;
      });
      cont.scrollTop = cont.scrollHeight;
    }
    
    window.handleChatKeyPress = function(e) { if(e.key === "Enter") transmitChatMessage(); }
    window.closeFloatingChatInstance = function() { document.getElementById('p2pChatBoxInstance').classList.remove('active'); }

    // External search bar event listeners initialization
    const searchBarElement = document.getElementById('searchBar');
    if(searchBarElement) {
        searchBarElement.addEventListener('input', executeCombinedFilters);
    }
    const sortSelectElement = document.getElementById('sortSelect');
    if(sortSelectElement) {
        sortSelectElement.addEventListener('change', executeCombinedFilters);
    }
  </script>
