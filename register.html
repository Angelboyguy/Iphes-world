<!DOCTYPE html>
<html>
<head>
  <title>Register - Iphe's World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1b183a, #2e0854); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #ffffff; position: relative; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 1; }
    .orb-1 { width: 280px; height: 280px; background: #38bdf8; top: -10px; left: -20px; animation: floatLeft 12s infinite alternate ease-in-out; }
    .orb-2 { width: 350px; height: 350px; background: #a855f7; bottom: -30px; right: -30px; animation: floatRight 15s infinite alternate ease-in-out; }
    @keyframes floatLeft { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.15); } }
    @keyframes floatRight { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-50px, -60px) scale(0.9); } }
    
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 35px 25px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); text-align: center; z-index: 2; }
    header h1 { font-size: 26px; margin-bottom: 5px; letter-spacing: 0.5px; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    hr { border: none; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 20px 0; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 8px; padding-left: 4px; }
    .password-container { position: relative; display: flex; align-items: center; }
    input { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; color: #ffffff; font-size: 15px; outline: none; transition: all 0.3s ease; }
    .password-container input { padding-right: 65px; }
    input::placeholder { color: #54657d; }
    input:focus { background: rgba(255, 255, 255, 0.1); border-color: #38bdf8; box-shadow: 0 0 12px rgba(56, 189, 248, 0.2); }
    .toggle-password { position: absolute; right: 16px; background: none; border: none; color: #38bdf8; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
    
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #38bdf8, #a855f7); border: none; border-radius: 12px; color: #ffffff; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); transition: transform 0.1s ease; }
    .submit-btn:active { transform: scale(0.96); animation: pressGlow 0.4s ease-out; }
    @keyframes pressGlow { 0% { box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); } 50% { box-shadow: 0 0 25px rgba(56, 189, 248, 0.8), 0 0 50px rgba(168, 85, 247, 0.6); } 100% { box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); } }
    p { font-size: 14px; color: #cbd5e1; }
    a { color: #38bdf8; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="glass-card">
    <header>
      <h1>Create Account</h1>
      <p style="color: #94a3b8; font-size: 13px;">Join Iphe's World today</p>
    </header>

    <hr>

    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" required placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Choose Password</label>
        <div class="password-container">
          <input type="password" id="registerPassword" required placeholder="Create a strong password">
          <button type="button" class="toggle-password" onclick="handleToggle('registerPassword', this)">Show</button>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="regBtn">Register Account</button>
    </form>

    <hr>

    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>

  <script>
    function handleToggle(inputId, buttonEl) {
      const targetInput = document.getElementById(inputId);
      if (targetInput.type === "password") {
        targetInput.type = "text";
        buttonEl.textContent = "Hide";
      } else {
        targetInput.type = "password";
        buttonEl.textContent = "Show";
      }
    }

    // --- NEW REDIRECT LOGIC ---
    function handleRegister(event) {
      event.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.textContent = "Creating Account...";
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    }
  </script>

</body>
</html>
